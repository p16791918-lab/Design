<!doctype html><html><head><meta charset="utf-8">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head><body><pre id="o">starting</pre>
<script>
const url=new URLSearchParams(location.search).get('f');
const o=document.getElementById('o');
(async()=>{
 try{
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  o.textContent='loading doc';
  const pdf=await pdfjsLib.getDocument({url,disableFontFace:true}).promise;
  let all='';
  for(let p=1;p<=pdf.numPages;p++){
    o.textContent='page '+p+'/'+pdf.numPages;
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    all+='\n=== PAGE '+p+' ===\n'+tc.items.map(i=>i.str).join('');
  }
  window.__text=all;
  o.textContent='DONE len='+all.length;
  document.title='DONE';
 }catch(e){o.textContent='ERR '+(e&&e.stack||e);document.title='ERR';}
})();
</script></body></html>
